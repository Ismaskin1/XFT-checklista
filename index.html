<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>XFT Utrustningschecklista</title>
<style>
  :root {
    --bg: #0e0e0f; --surface: #18181b; --surface2: #222226;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f4f4f5; --muted: #a1a1aa;
    --accent: #35e375; --accent-dim: rgba(53,227,117,0.12);
    --danger: #ff4d4d; --danger-dim: rgba(255,77,77,0.1);
    --success: #4ade80; --success-dim: rgba(74,222,128,0.1);
    --warning: #fbbf24; --warning-dim: rgba(251,191,36,0.1);
    --radius: 12px; --radius-lg: 18px; --tab-h: 72px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }

  header { background: var(--bg); padding: 2rem 1rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--border); }
  header img { height: 90px; width: auto; }
  .header-sub { display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .header-title { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; }
  .reset-btn { background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #52525b; font-size: 0.65rem; padding: 0.3rem 0.6rem; cursor: pointer; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: var(--tab-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border: none; background: transparent; color: var(--muted); font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; }
  .nav-btn .icon { font-size: 1.4rem; line-height: 1; }
  .nav-btn.active { color: var(--accent); }
  .nav-status { font-size: 0.55rem; color: var(--accent); height: 8px; }

  .main { padding: 1.25rem 1rem calc(var(--tab-h) + 2rem); max-width: 600px; margin: 0 auto; }
  .phase-panel { display: none; }
  .phase-panel.active { display: block; }

  .session-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; }
  .field-group { margin-bottom: 1rem; }
  .field-group:last-child { margin-bottom: 0; }
  .field-group label { display: block; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; font-weight: 600; }
  .field-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 0.875rem 1rem; color: var(--text); font-size: 1rem; outline: none; -webkit-appearance: none; }
  .field-group input:focus { border-color: var(--accent); }

  .locked-banner { display: flex; align-items: center; gap: 0.75rem; background: var(--accent-dim); border: 1px solid rgba(53,227,117,0.2); border-radius: var(--radius); padding: 0.875rem 1rem; margin-bottom: 1.25rem; font-size: 0.82rem; color: var(--accent); }

  .group-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 0.75rem; }
  .group-header { display: flex; align-items: center; padding: 1rem 1.25rem; gap: 0.75rem; cursor: pointer; user-select: none; min-height: 64px; }
  .group-header:active { background: var(--surface2); }
  .group-icon { font-size: 1.2rem; flex-shrink: 0; }
  .group-name { font-size: 1rem; font-weight: 700; color: var(--text); flex: 1; }
  .group-count { font-size: 0.72rem; color: var(--muted); flex-shrink: 0; }
  .group-chevron { font-size: 0.7rem; color: var(--muted); flex-shrink: 0; margin-left: 0.25rem; }

  .group-check { width: 28px; height: 28px; flex-shrink: 0; border: 2px solid var(--border2); border-radius: 8px; background: transparent; display: flex; align-items: center; justify-content: center; transition: all 0.15s; position: relative; }
  .group-check.checked { background: var(--accent); border-color: var(--accent); }
  .group-check.checked::after { content: ""; position: absolute; width: 14px; height: 8px; border-left: 2.5px solid #111; border-bottom: 2.5px solid #111; transform: rotate(-45deg) translateY(-1px); }
  .group-check.partial { background: var(--accent); border-color: var(--accent); }

  .item-row { display: flex; align-items: center; padding: 0.875rem 1.25rem; border-top: 1px solid var(--border); gap: 1rem; min-height: 54px; cursor: pointer; user-select: none; background: rgba(0,0,0,0.15); }
  .item-row:active { background: var(--surface2); }
  .item-row.not-taken { opacity: 0.3; }

  .item-check { width: 24px; height: 24px; flex-shrink: 0; border: 2px solid var(--border2); border-radius: 6px; background: transparent; display: flex; align-items: center; justify-content: center; transition: all 0.15s; position: relative; }
  .item-check.checked { background: var(--accent); border-color: var(--accent); }
  .item-check.checked::after { content: ""; position: absolute; width: 12px; height: 7px; border-left: 2px solid #111; border-bottom: 2px solid #111; transform: rotate(-45deg) translateY(-1px); }

  .item-name { font-size: 0.9rem; color: var(--text); flex: 1; line-height: 1.3; }
  .item-serial { font-size: 0.65rem; color: var(--muted); flex-shrink: 0; }
  .phase-badge { display: inline-flex; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-taken { background: var(--success-dim); color: var(--success); }
  .badge-missing { background: var(--danger-dim); color: var(--danger); }

  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  .action-btn { width: 100%; padding: 1.1rem; border: none; border-radius: var(--radius-lg); background: var(--accent); color: #111; font-size: 1rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-top: 1rem; }
  .action-btn:active { opacity: 0.85; }
  .action-btn-sec { width: 100%; padding: 0.875rem; border: 1px solid var(--border2); border-radius: var(--radius-lg); background: transparent; color: var(--muted); font-size: 0.85rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; margin-top: 0.75rem; }
  .action-btn-sec:active { background: var(--surface2); color: var(--text); }

  .wear-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
  .wear-card-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--warning); }
  .wear-item { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
  .wear-item:last-child { border-bottom: none; }
  .wear-item-name { font-size: 0.9rem; margin-bottom: 0.75rem; line-height: 1.3; }
  .wear-opts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; }
  .wear-opt { padding: 0.7rem 0.25rem; border-radius: var(--radius); font-size: 0.78rem; font-weight: 600; border: 1.5px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; text-align: center; }
  .wear-opt:active { opacity: 0.7; }
  .wear-opt.ok.sel { background: var(--success-dim); border-color: var(--success); color: var(--success); }
  .wear-opt.slitage.sel { background: var(--warning-dim); border-color: var(--warning); color: var(--warning); }
  .wear-opt.skadad.sel { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
  .wear-comment { width: 100%; margin-top: 0.75rem; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 0.75rem 1rem; color: var(--text); font-size: 0.9rem; resize: none; outline: none; display: none; -webkit-appearance: none; }
  .wear-comment:focus { border-color: var(--warning); }
  .wear-comment.show { display: block; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: var(--surface); border-top: 1px solid var(--border2); border-radius: 20px 20px 0 0; padding: 1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom)); width: 100%; max-width: 600px; }
  .modal-handle { width: 40px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 1.25rem; }
  .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem; letter-spacing: 0.06em; text-transform: uppercase; }
  .modal-btn { width: 100%; padding: 1rem; border: none; border-radius: var(--radius-lg); font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem; }
  .modal-btn-danger { background: var(--danger-dim); color: var(--danger); border: 1px solid var(--danger); }
  .modal-btn-cancel { background: var(--surface2); color: var(--muted); border: none; }

  .toast { position: fixed; bottom: calc(var(--tab-h) + 1rem); left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface); border: 1px solid var(--border2); color: var(--text); padding: 0.75rem 1.5rem; border-radius: var(--radius); font-size: 0.85rem; transition: transform 0.3s; z-index: 999; white-space: nowrap; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .success-screen { display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem; text-align: center; gap: 1.25rem; }
  .success-icon { width: 80px; height: 80px; border-radius: 50%; background: var(--accent-dim); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
  .success-title { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
  .success-sub { color: var(--muted); font-size: 0.9rem; line-height: 1.7; }
</style>
</head>

        <label>Kundnamn</label>

</nav>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const EQUIPMENT = [

  { id:2,  name:"Minneskort 249 GB",       serial:"",                  group:"DJI-kamera" },

  { id:46, name:"USB-C sladd #2",          serial:"",                  group:"Ljus" },
  { id:47, name:"Förlängningssladd",       serial:"",                  group:"Ljus" },
  { id:48, name:"Kameraväska",             serial:"",                  group:"Övrigt" },
  { id:49, name:"ON Gimbal + stativ",      serial:"",                  group:"Övrigt" },
  { id:50, name:"DJI RS3 Mini",            serial:"P20M",              group:"Övrigt" },
  { id:51, name:"RS3 Mini stativ",         serial:"",                  group:"Övrigt" },
];

const ICONS = { "DJI-kamera":"🎥","Drönare":"🚁","Ljus":"💡","Backdrop":"🎭","Mikrofon":"🎙️","Stillbildskamera":"📷","Övrigt":"🎒" };
const STORE_KEY = 'xft_v2';

// ── STATE ─────────────────────────────────────────────────────────────────
function freshState() {
  return {
    utresa: { locked:false, filmer:'', customer:'', date:'', taken:[] },
    hemresa: { locked:false, returned:[] },
    kontor: { wear:{} },
    openGroups: {}
  };
}

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || freshState(); }
  catch(e) { return freshState(); }
}

function save(s) { localStorage.setItem(STORE_KEY, JSON.stringify(s)); }

// ── UTILS ─────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function switchTab(tab) {
  document.querySelectorAll('.phase-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  render();
}

function hardReset() {
  if (confirm('Återställer appen och rensar all sparad data. Fortsätta?')) {
    localStorage.removeItem(STORE_KEY);
    location.reload();
  }
}

function groups(items) {
  const g = {};
  items.forEach(i => { if (!g[i.group]) g[i.group] = []; g[i.group].push(i); });
  return g;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  renderUtresa();
  renderHemresa();
  renderKontor();
  const s = load();
  document.getElementById('ns-utresa').textContent = s.utresa.locked ? '✓' : '';
  document.getElementById('ns-hemresa').textContent = s.hemresa.locked ? '✓' : '';
}

function renderUtresa() {
  const s = load();
  if (!s.openGroups) s.openGroups = {};

  document.getElementById('session-form').style.display = s.utresa.locked ? 'none' : 'block';
  document.getElementById('utresa-actions').style.display = s.utresa.locked ? 'none' : 'block';
  const banner = document.getElementById('locked-banner');
  if (s.utresa.locked) {
    banner.style.display = 'flex';
    document.getElementById('locked-text').textContent = s.utresa.filmer + ' · ' + s.utresa.customer + ' · ' + s.utresa.date;
  } else {
    banner.style.display = 'none';
    if (s.utresa.date) document.getElementById('trip-date').value = s.utresa.date;
    if (s.utresa.filmer) document.getElementById('filmer-name').value = s.utresa.filmer;
    if (s.utresa.customer) document.getElementById('customer-name').value = s.utresa.customer;
  }

  const taken = s.utresa.taken;
  const pct = EQUIPMENT.length ? Math.round(taken.length / EQUIPMENT.length * 100) : 0;
  let html = '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';

  const g = groups(EQUIPMENT);
  Object.entries(g).forEach(function([gname, items]) {
    const checked = items.filter(function(i){ return taken.includes(i.id); }).length;
    const all = checked === items.length;
    const some = checked > 0 && !all;
    const open = s.openGroups[gname] !== false;
    const genc = encodeURIComponent(gname);

    html += '<div class="group-card">';
    html += '<div class="group-header" data-group="' + genc + '" data-type="utresa-open">';
    html += '<div class="group-check ' + (all ? 'checked' : some ? 'partial' : '') + '" data-group="' + genc + '" data-type="utresa-all">';
    if (some) html += '<span style="color:#111;font-weight:700;font-size:0.9rem;line-height:1;">−</span>';
    html += '</div>';
    html += '<span class="group-icon">' + (ICONS[gname]||'📦') + '</span>';
    html += '<span class="group-name">' + gname + '</span>';
    html += '<span class="group-count">' + checked + '/' + items.length + '</span>';
    html += '<span class="group-chevron">' + (open ? '▲' : '▼') + '</span>';
    html += '</div>';

    if (open) {
      items.forEach(function(item) {
        const c = taken.includes(item.id);
        const notTaken = s.utresa.locked && !c ? ' not-taken' : '';
        html += '<div class="item-row' + notTaken + '" data-id="' + item.id + '" data-type="utresa-item">';
        html += '<div style="width:16px;flex-shrink:0"></div>';
        html += '<div class="item-check ' + (c ? 'checked' : '') + '"></div>';
        html += '<span class="item-name">' + item.name + '</span>';
        if (item.serial) html += '<span class="item-serial">SN: ' + item.serial + '</span>';
        html += '</div>';
      });
    }
    html += '</div>';
  });

  document.getElementById('checklist-utresa').innerHTML = html;
  // Attach event listeners
  document.querySelectorAll('[data-type="utresa-open"]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (!e.target.closest('[data-type="utresa-all"]')) {
        toggleGroupOpen(decodeURIComponent(this.dataset.group));
      }
    });
  });
  document.querySelectorAll('[data-type="utresa-all"]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!s.utresa.locked) toggleGroupAll(decodeURIComponent(this.dataset.group));
    });
  });
  document.querySelectorAll('[data-type="utresa-item"]').forEach(function(el) {
    el.addEventListener('click', function() {
      if (!s.utresa.locked) toggleItem(parseInt(this.dataset.id));
    });
  });
}

function renderHemresa() {
  const s = load();
  if (!s.openGroups) s.openGroups = {};

  if (!s.utresa.locked) {
    document.getElementById('checklist-hemresa').innerHTML = '<p style="color:var(--muted);padding:1rem;font-size:0.85rem;">Lås utresan först.</p>';
    document.getElementById('hemresa-actions').style.display = 'none';
    return;
  }

  const hemBanner = document.getElementById('locked-banner-hemresa');
  if (s.hemresa.locked) {
    hemBanner.style.display = 'flex';
    document.getElementById('locked-text-hemresa').textContent = 'Hemresa bekräftad';
    document.getElementById('hemresa-actions').style.display = 'none';
  } else {
    hemBanner.style.display = 'none';
    document.getElementById('hemresa-actions').style.display = 'block';
  }

  const takenItems = EQUIPMENT.filter(function(e){ return s.utresa.taken.includes(e.id); });
  const g = groups(takenItems);
  let html = '';

  Object.entries(g).forEach(function([gname, items]) {
    const ret = s.hemresa.returned;
    const checked = items.filter(function(i){ return ret.includes(i.id); }).length;
    const all = checked === items.length;
    const some = checked > 0 && !all;
    const open = s.openGroups['h_' + gname] !== false;
    const genc = encodeURIComponent(gname);

    html += '<div class="group-card">';
    html += '<div class="group-header" data-group="' + genc + '" data-type="hem-open">';
    html += '<div class="group-check ' + (all ? 'checked' : some ? 'partial' : '') + '" data-group="' + genc + '" data-type="hem-all">';
    if (some) html += '<span style="color:#111;font-weight:700;font-size:0.9rem;line-height:1;">−</span>';
    html += '</div>';
    html += '<span class="group-icon">' + (ICONS[gname]||'📦') + '</span>';
    html += '<span class="group-name">' + gname + '</span>';
    html += '<span class="group-count">' + checked + '/' + items.length + '</span>';
    html += '<span class="group-chevron">' + (open ? '▲' : '▼') + '</span>';
    html += '</div>';

    if (open) {
      items.forEach(function(item) {
        const c = ret.includes(item.id);
        html += '<div class="item-row" data-id="' + item.id + '" data-type="hem-item">';
        html += '<div style="width:16px;flex-shrink:0"></div>';
        html += '<div class="item-check ' + (c ? 'checked' : '') + '"></div>';
        html += '<span class="item-name">' + item.name + '</span>';
        if (s.hemresa.locked) html += c ? '<span class="phase-badge badge-taken">✓</span>' : '<span class="phase-badge badge-missing">saknas</span>';
        html += '</div>';
      });
    }
    html += '</div>';
  });

  document.getElementById('checklist-hemresa').innerHTML = html;
  document.querySelectorAll('[data-type="hem-open"]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (!e.target.closest('[data-type="hem-all"]')) {
        toggleHemGroupOpen(decodeURIComponent(this.dataset.group));
      }
    });
  });
  document.querySelectorAll('[data-type="hem-all"]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!s.hemresa.locked) toggleHemGroupAll(decodeURIComponent(this.dataset.group));
    });
  });
  document.querySelectorAll('[data-type="hem-item"]').forEach(function(el) {
    el.addEventListener('click', function() {
      if (!s.hemresa.locked) toggleHemItem(parseInt(this.dataset.id));
    });
  });
}

function renderKontor() {
  const s = load();
  if (!s.utresa.locked) {
    document.getElementById('wear-checks').innerHTML = '<p style="color:var(--muted);padding:1rem;font-size:0.85rem;">Lås utresan och hemresan först.</p>';
    document.getElementById('kontor-actions').style.display = 'none';
    return;
  }
  document.getElementById('kontor-actions').style.display = 'block';

  const takenItems = EQUIPMENT.filter(e => s.utresa.taken.includes(e.id));
  let html = '<div class="wear-card"><div class="wear-card-header">⚠ Kontrollera slitage och skador</div>';
  takenItems.forEach(item => {
    const w = s.kontor.wear[item.id] || { status:null, comment:'' };
    const show = w.status === 'slitage' || w.status === 'skadad';
    html += '<div class="wear-item">';
    html += '<div class="wear-item-name">' + item.name + '</div>';
    html += '<div class="wear-opts">';
    html += '<button class="wear-opt ok' + (w.status==='ok'?' sel':'') + '" data-id="' + item.id + '" data-status="ok">✓ OK</button>';
    html += '<button class="wear-opt slitage' + (w.status==='slitage'?' sel':'') + '" data-id="' + item.id + '" data-status="slitage">Slitage</button>';
    html += '<button class="wear-opt skadad' + (w.status==='skadad'?' sel':'') + '" data-id="' + item.id + '" data-status="skadad">Skadad</button>';
    html += '</div>';
    html += '<textarea class="wear-comment' + (show?' show':'') + '" rows="2" id="wc-' + item.id + '" onchange="setWearComment(' + item.id + ',this.value)" placeholder="Beskriv skadan...">' + (w.comment||'') + '</textarea>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('wear-checks').innerHTML = html;
  document.querySelectorAll('.wear-opt').forEach(function(btn) {
    btn.addEventListener('click', function() {
      setWear(parseInt(this.dataset.id), this.dataset.status);
    });
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function toggleItem(id) {
  const s = load();
  if (s.utresa.locked) return;
  const i = s.utresa.taken.indexOf(id);
  if (i === -1) s.utresa.taken.push(id);
  else s.utresa.taken.splice(i, 1);
  save(s); renderUtresa();
}

function toggleGroupAll(gname) {
  const s = load();
  if (s.utresa.locked) return;
  const items = EQUIPMENT.filter(e => e.group === gname);
  const allChecked = items.every(e => s.utresa.taken.includes(e.id));
  items.forEach(item => {
    if (allChecked) { s.utresa.taken = s.utresa.taken.filter(id => id !== item.id); }
    else { if (!s.utresa.taken.includes(item.id)) s.utresa.taken.push(item.id); }
  });
  save(s); renderUtresa();
}

function toggleGroupOpen(gname) {
  const s = load();
  if (!s.openGroups) s.openGroups = {};
  s.openGroups[gname] = s.openGroups[gname] === false ? true : false;
  save(s); renderUtresa();
}

function selectAllUtresa() {
  const s = load();
  s.utresa.taken = EQUIPMENT.map(e => e.id);
  save(s); renderUtresa();
}

function lockUtresa() {
  const s = load();
  const filmer = document.getElementById('filmer-name').value.trim();
  const customer = document.getElementById('customer-name').value.trim();
  const date = document.getElementById('trip-date').value;
  if (!customer) { toast('⚠️ Fyll i kundnamn'); return; }
  if (!date) { toast('⚠️ Välj datum'); return; }
  if (!s.utresa.taken.length) { toast('⚠️ Välj minst en sak'); return; }
  s.utresa.filmer = filmer || 'Okänd';
  s.utresa.customer = customer;
  s.utresa.date = date;
  s.utresa.locked = true;
  save(s); toast('🔒 Utresa låst!'); render();
}

function toggleHemItem(id) {
  const s = load();
  if (s.hemresa.locked) return;
  const i = s.hemresa.returned.indexOf(id);
  if (i === -1) s.hemresa.returned.push(id);
  else s.hemresa.returned.splice(i, 1);
  save(s); renderHemresa();
}

function toggleHemGroupAll(gname) {
  const s = load();
  if (s.hemresa.locked) return;
  const takenItems = EQUIPMENT.filter(e => s.utresa.taken.includes(e.id) && e.group === gname);
  const allChecked = takenItems.every(e => s.hemresa.returned.includes(e.id));
  takenItems.forEach(item => {
    if (allChecked) { s.hemresa.returned = s.hemresa.returned.filter(id => id !== item.id); }
    else { if (!s.hemresa.returned.includes(item.id)) s.hemresa.returned.push(item.id); }
  });
  save(s); renderHemresa();
}

function toggleHemGroupOpen(gname) {
  const s = load();
  if (!s.openGroups) s.openGroups = {};
  s.openGroups['h_' + gname] = s.openGroups['h_' + gname] === false ? true : false;
  save(s); renderHemresa();
}

function selectAllHemresa() {
  const s = load();
  s.hemresa.returned = [...s.utresa.taken];
  save(s); renderHemresa();
}

function lockHemresa() {
  const s = load();
  s.hemresa.locked = true;
  save(s); toast('✓ Hemresa bekräftad!'); render();
}

function setWear(id, status) {
  const s = load();
  if (!s.kontor.wear[id]) s.kontor.wear[id] = { status:null, comment:'' };
  s.kontor.wear[id].status = status;
  save(s); renderKontor();
}

function setWearComment(id, val) {
  const s = load();
  if (!s.kontor.wear[id]) s.kontor.wear[id] = { status:null, comment:'' };
  s.kontor.wear[id].comment = val;
  save(s);
}

function submitKontor() {
  const s = load();
  const takenItems = EQUIPMENT.filter(e => s.utresa.taken.includes(e.id));
  const allChecked = takenItems.every(e => s.kontor.wear[e.id] && s.kontor.wear[e.id].status);
  if (!allChecked) { toast('⚠️ Markera status för all utrustning'); return; }

  const missing = s.utresa.taken.filter(id => !s.hemresa.returned.includes(id)).map(id => EQUIPMENT.find(e=>e.id===id)?.name).filter(Boolean);
  const damaged = Object.entries(s.kontor.wear).filter(([,w]) => w.status !== 'ok').map(([id,w]) => ({ name: EQUIPMENT.find(e=>e.id==id)?.name||'Okänd', status:w.status, comment:w.comment }));

  let body = 'Uppdragsrapport — ' + s.utresa.customer + '\nDatum: ' + s.utresa.date + '\nFilmare: ' + s.utresa.filmer + '\n\n';
  body += 'MEDTAGEN UTRUSTNING (' + s.utresa.taken.length + ' st)\n';
  s.utresa.taken.forEach(id => { const e = EQUIPMENT.find(x=>x.id===id); if(e) body += '  • ' + e.name + '\n'; });
  if (missing.length) { body += '\nSAKNAS VID HEMKOMST\n'; missing.forEach(n => body += '  • ' + n + '\n'); }
  if (damaged.length) { body += '\nSKADOR / SLITAGE\n'; damaged.forEach(w => { body += '  • [' + w.status.toUpperCase() + '] ' + w.name; if(w.comment) body += ' — ' + w.comment; body += '\n'; }); }

  document.getElementById('panel-kontor').innerHTML = '<div class="success-screen"><div class="success-icon" style="font-size:1.5rem;">⏳</div><div class="success-title" style="color:var(--muted);">Skickar...</div></div>';

  const fd = new FormData();
  fd.append('_subject', 'Utrustningsrapport — ' + s.utresa.customer + ' — ' + s.utresa.date);
  fd.append('Filmare', s.utresa.filmer);
  fd.append('Kund', s.utresa.customer);
  fd.append('Datum', s.utresa.date);
  fd.append('Rapport', body);

  fetch('https://formspree.io/f/xeedpwrz', { method:'POST', body:fd, headers:{'Accept':'application/json'} })
    .then(r => {
      if (r.ok) {
        document.getElementById('panel-kontor').innerHTML = '<div class="success-screen"><div class="success-icon">✓</div><div class="success-title">Rapport skickad!</div><div class="success-sub">Skickad till filmteamet@xft.se</div><button class="action-btn" style="width:100%;margin-top:1rem;" onclick="newSession()">+ Nytt uppdrag</button></div>';
        localStorage.removeItem(STORE_KEY);
      } else { showErr(); }
    }).catch(showErr);
}

function showErr() {
  document.getElementById('panel-kontor').innerHTML = '<div class="success-screen"><div class="success-icon" style="border-color:var(--danger);background:var(--danger-dim);font-size:1.5rem;">⚠</div><div class="success-title" style="color:var(--danger);">Ingen uppkoppling</div><div class="success-sub">Kontrollera internet och försök igen.</div><button class="action-btn" style="width:100%;margin-top:1rem;" onclick="switchTab(&quot;kontor&quot;)">Försök igen</button></div>';
}

function newSession() { localStorage.removeItem(STORE_KEY); location.reload(); }

// ── START ─────────────────────────────────────────────────────────────────
document.getElementById('trip-date').valueAsDate = new Date();
const _s = load();
if (_s.hemresa && _s.hemresa.locked) switchTab('kontor');
else if (_s.utresa && _s.utresa.locked) switchTab('hemresa');
else render();
</script>
</body>
</html>
